scrape_configs:
  - job_name: 'node_exporter'
    static_configs:
      - targets:
          - '192.168.100.10:9100'   # lb1
          - '192.168.100.11:9100'   # lb2
    scrape_interval: 15s

  - job_name: 'nginx_vts'
    static_configs:
      - targets:
          - '192.168.100.10:80'     # lb1
          - '192.168.100.11:80'     # lb2
    metrics_path: /status
    params:
      format: ['prometheus']
    scrape_interval: 15s
