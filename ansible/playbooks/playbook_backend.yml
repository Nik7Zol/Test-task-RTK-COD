- name: Install backend application
  hosts: backend
  become: yes
  tasks:
    - name: Install Python3 and Flask
      apt:
        name:
          - python3
          - python3-flask
        state: present

    - name: Create backend directory
      file:
        path: /opt/backend
        state: directory
        owner: www-data
        group: www-data

    - name: Copy backend application
      copy:
        src: /ansible/files/backend_app.py
        dest: /opt/backend/app.py
        mode: 0755

    - name: Check if backend app is running
      command: pgrep -f "python3 /opt/backend/app.py"
      register: backend_pid
      failed_when: false
      changed_when: false

    - name: Start backend app if not running
      shell: "nohup python3 /opt/backend/app.py > /var/log/backend.log 2>&1 &"
      when: backend_pid.rc != 0
