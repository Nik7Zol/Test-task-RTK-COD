- name: Install node_exporter with textfile collector
  hosts: all:!monitoring
  become: yes
  vars:
    node_exporter_version: "1.7.0"
  tasks:
    - name: Download node_exporter
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: /tmp/node_exporter.tar.gz

    - name: Extract node_exporter
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /usr/local/bin/
        remote_src: yes
        extra_opts: ['--strip-components=1']

    - name: Create directory for textfile collector
      file:
        path: /var/lib/node_exporter/textfile
        state: directory
        mode: 0755

    - name: Start node_exporter with textfile collector
      shell: "nohup /usr/local/bin/node_exporter --collector.textfile.directory=/var/lib/node_exporter/textfile > /dev/null 2>&1 &"
      become: yes
      ignore_errors: yes

- name: Setup keepalived metrics (textfile collector)
  hosts: lb
  become: yes
  tasks:
    - name: Create check VIP script
      copy:
        dest: /usr/local/bin/check_vip.sh
        mode: 0755
        content: |
          #!/bin/bash
          VIP="192.168.100.100"
          if ip addr show | grep -q $VIP; then
            echo 'keepalived_vip{node="'$(hostname)'"} 1' > /var/lib/node_exporter/textfile/keepalived.prom
          else
            echo 'keepalived_vip{node="'$(hostname)'"} 0' > /var/lib/node_exporter/textfile/keepalived.prom
          fi

    - name: Install cron
      apt:
        name: cron
        state: present

    - name: Start cron
      shell: service cron start || cron
      become: yes
      ignore_errors: yes

    - name: Add cron job for VIP check
      cron:
        name: "check_vip"
        minute: "*"
        job: "/usr/local/bin/check_vip.sh"
