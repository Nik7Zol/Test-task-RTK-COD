- name: Install node_exporter on all nodes
  hosts: all:!monitoring
  become: yes
  vars:
    node_exporter_version: "1.7.0"
  tasks:
    - name: Download node_exporter
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: /tmp/node_exporter.tar.gz

    - name: Extract node_exporter
      unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /usr/local/bin/
        remote_src: yes
        extra_opts: ['--strip-components=1']

    - name: Ensure node_exporter is executable
      file:
        path: /usr/local/bin/node_exporter
        mode: 0755

    - name: Start node_exporter as background process
      shell: |
        nohup /usr/local/bin/node_exporter > /var/log/node_exporter.log 2>&1 &
        sleep 2
        pgrep node_exporter
      become: yes
      register: node_start
      failed_when: node_start.rc != 0

- name: Setup keepalived metrics (textfile collector) on lb nodes
  hosts: lb
  become: yes
  tasks:
    - name: Create directory for textfile collector
      file:
        path: /var/lib/node_exporter/textfile
        state: directory
        mode: 0755

    - name: Create script to check VIP
      copy:
        dest: /usr/local/bin/check_vip.sh
        mode: 0755
        content: |
          #!/bin/bash
          VIP="192.168.100.100"
          if ip addr show | grep -q $VIP; then
            echo 'keepalived_vip{node="'$(hostname)'"} 1' > /var/lib/node_exporter/textfile/keepalived.prom
          else
            echo 'keepalived_vip{node="'$(hostname)'"} 0' > /var/lib/node_exporter/textfile/keepalived.prom
          fi

    - name: Install cron
      apt:
        name: cron
        state: present

    - name: Start cron daemon
      shell: pgrep cron || (cron && sleep 1)
      become: yes
      changed_when: false
      ignore_errors: yes

    - name: Add cron job to update VIP status
      cron:
        name: "check_vip"
        minute: "*"
        job: "/usr/local/bin/check_vip.sh"
